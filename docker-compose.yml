services:
  openpotd:
    build:
      context: .
      dockerfile: Dockerfile
    image: openpotd:latest
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      OPENPOTD_DATA_DIR: /app/data
      OPENPOTD_CONFIG_DIR: /app/config
    volumes:
      - ./data:/app/data
      - ./config:/app/config
