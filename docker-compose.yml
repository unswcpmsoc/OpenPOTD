services:
  openpotd:
    build:
      context: .
      dockerfile: Dockerfile
    image: openpotd:latest
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      OPENPOTD_DATA_DIR: /app/data
      OPENPOTD_CONFIG_DIR: /app/config
    volumes:
      - openpotd_data:/app/data
      - openpotd_config:/app/config

volumes:
  openpotd_data:
  openpotd_config:
